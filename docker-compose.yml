services:
  mysql:
    image: mysql:8.4
    command: --mysql-native-password=ON
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_USER=petmanagement
      - MYSQL_PASSWORD=petmanagement
      - MYSQL_DATABASE=petmanagement
    volumes:
      - "./conf.d:/etc/mysql/conf.d:ro"
    profiles:
      - mysql
  postgres:
    image: postgres:16.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=petmanagement
      - POSTGRES_USER=petmanagement
      - POSTGRES_DB=petmanagement
    profiles:
      - postgres
